name: CI

on:
  push:
    branches:
      - main
      - dev
      - fix/**
  pull_request:
  workflow_dispatch:

jobs:
  # -------------------------
  # FRONTEND
  # -------------------------
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web bundle
        run: npx expo export --platform web

  # -------------------------
  # API GATEWAY
  # -------------------------
  api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    env:
      FLASK_DEBUG: false

    defaults:
      run:
        working-directory: backend/api-gateway-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # -------------------------
      # SMOKE TEST
      # -------------------------
      - name: Start service
        run: |
          nohup python run.py > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for service
        run: |
          echo "Waiting for service to be live..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:8080/health > /dev/null; then
              echo "Service is up!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to start"
          cat server.log
          exit 1

      - name: Cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Show logs on failure
        if: failure()
        run: cat server.log


  # -------------------------
  # BACKEND SERVICES
  # -------------------------
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            port: 5000
          - service: trail-service
            port: 5000
          - service: review-service
            port: 5000
          # - service: media-service
          #   port: 5000

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FLASK_DEBUG: false

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # -------------------------
      # SMOKE TEST
      # -------------------------
      - name: Start service
        run: |
          nohup python run.py > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for service
        run: |
          echo "Waiting for service to be live..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:${{ matrix.port }}/health > /dev/null; then
              echo "Service is up!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to start"
          cat server.log
          exit 1

      - name: Wait for service
        run: |
          echo "Waiting for service to be ready..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:${{ matrix.port }}/ready > /dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to get ready"
          cat server.log
          exit 1

      - name: Cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Show logs on failure
        if: failure()
        run: cat server.log
  # -------------------------
  # KUBERNETES INTEGRATION TEST
  # -------------------------
  k8s-test:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout code
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # 2. Create kind cluster
      # -------------------------
      - name: Create Kubernetes cluster
        uses: helm/kind-action@v1

      # -------------------------
      # 3. Verify cluster
      # -------------------------
      - name: Cluster info
        run: kubectl cluster-info

      # -------------------------
      # 4. Apply Kubernetes manifests
      # -------------------------
      - name: Deploy application
        run: kubectl apply -f k8s/

      # -------------------------
      # 5. Wait for all deployments
      # -------------------------
      - name: Wait for deployments to be ready
        run: |
          kubectl wait --for=condition=available deployment \
          --all --timeout=180s

      # -------------------------
      # 6. Check pods health (extra safety)
      # -------------------------
      - name: Check pod status
        run: kubectl get pods -A

      # -------------------------
      # 7. Test API Gateway internally (BEST PRACTICE)
      # -------------------------
      - name: Test API Gateway (cluster internal)
        run: |
          kubectl run test-client \
            --image=curlimages/curl \
            --rm -i --restart=Never -- \
            curl http://api-gateway

      # -------------------------
      # 8. Optional: debug on failure
      # -------------------------
      - name: Debug cluster state
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -A
          kubectl logs -l app=api-gateway --tail=50 || true


