name: CI

on:
  push:
    branches:
      - main
      - dev
      - fix/**
  pull_request:
  workflow_dispatch:

jobs:
  # -------------------------
  # FRONTEND
  # -------------------------
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web bundle
        run: npx expo export --platform web

  # -------------------------
  # API GATEWAY
  # -------------------------
  api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    env:
      FLASK_DEBUG: false

    defaults:
      run:
        working-directory: backend/api-gateway-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # -------------------------
      # SMOKE TEST
      # -------------------------
      - name: Start service
        run: |
          nohup python run.py > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for service
        run: |
          echo "Waiting for service to be live..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:8080/health > /dev/null; then
              echo "Service is up!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to start"
          cat server.log
          exit 1

      - name: Cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Show logs on failure
        if: failure()
        run: cat server.log


  # -------------------------
  # BACKEND SERVICES
  # -------------------------
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            port: 5000
          - service: trail-service
            port: 5000
          - service: review-service
            port: 5000
          # - service: media-service
          #   port: 5000

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FLASK_DEBUG: false

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # -------------------------
      # SMOKE TEST
      # -------------------------
      - name: Start service
        run: |
          nohup python run.py > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for service
        run: |
          echo "Waiting for service to be live..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:${{ matrix.port }}/health > /dev/null; then
              echo "Service is up!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to start"
          cat server.log
          exit 1

      - name: Wait for service
        run: |
          echo "Waiting for service to be ready..."

          for i in {1..15}; do
            if curl -f http://127.0.0.1:${{ matrix.port }}/ready > /dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            sleep 2
          done

          echo "Service failed to get ready"
          cat server.log
          exit 1

      - name: Cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Show logs on failure
        if: failure()
        run: cat server.log
  # -------------------------
  # KUBERNETES INTEGRATION TEST
  # -------------------------
  k8s-test:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # 2. Setup Docker
      # -------------------------
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      # -------------------------
      # 3. Create kind cluster
      # -------------------------
      - name: Create Kubernetes cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind


      # -------------------------
      # 4. Build images (RUN FROM ROOT)
      # -------------------------
      - name: Build Docker images
        run: |
          chmod +x infrastructure/k8s/build-images.sh
          ./infrastructure/k8s/build-images.sh

      # -------------------------
      # 5. Load images into kind (if still using kind)
      # -------------------------
      - name: Load images into kind
        run: |
          kind load docker-image mountainhub-api-gateway:latest
          kind load docker-image mountainhub-auth:latest
          kind load docker-image mountainhub-review:latest
          kind load docker-image mountainhub-trail:latest


      # -------------------------
      # 6. Create Kubernetes secret (inject GitHub Secrets)
      # -------------------------
      - name: Create Kubernetes secret (inject GitHub Secrets)
        run: |
          cat <<EOF > infrastructure/k8s/secrets.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: mountainhub-secrets
            namespace: mountainhub
          type: Opaque
          stringData:
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
            SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}"
            SUPABASE_BUCKET_GPX: "gpx-files"
            SUPABASE_BUCKET_MEDIA: "media-files"
          EOF


      # -------------------------
      # 7. Apply manifests (RUN FROM ROOT)
      # -------------------------
      - name: Deploy Kubernetes manifests
        run: |
          chmod +x infrastructure/k8s/apply.sh
          ./infrastructure/k8s/apply.sh

      #DEBUG
      - name: Debug Kubernetes state
        if: always()
        run: |
          echo "==> Pods:"
          kubectl get pods -n mountainhub

          echo "==> Deployments:"
          kubectl get deployments -n mountainhub

          echo "==> Services:"
          kubectl get svc -n mountainhub

          echo "==> Events (most important):"
          kubectl get events -n mountainhub --sort-by=.metadata.creationTimestamp

      # -------------------------
      # 8. Wait for readiness
      # -------------------------
      - name: Wait for deployments
        run: |
          kubectl wait --for=condition=available deployment \
          --all -n mountainhub --timeout=120s

      #DEBUG
      - name: Debug Kubernetes state
        if: always()
        run: |
          echo "==> Pods:"
          kubectl get pods -n mountainhub

          echo "==> Deployments:"
          kubectl get deployments -n mountainhub

          echo "==> Services:"
          kubectl get svc -n mountainhub

          echo "==> Events (most important):"
          kubectl get events -n mountainhub --sort-by=.metadata.creationTimestamp
          

      # -------------------------
      # 9. Verify cluster
      # -------------------------
      - name: Cluster status
        run: |
          kubectl get pods -A
          kubectl get svc -A

      # -------------------------
      # 10. Test API Gateway
      # -------------------------
      - name: Test API Gateway
        run: |
          kubectl run test-client \
            --image=curlimages/curl \
            --rm -i --restart=Never -- \
            curl http://api-gateway

      # -------------------------
      # 11. Debug on failure
      # -------------------------
      - name: Debug logs
        if: failure()
        run: |
          kubectl get pods -A
          kubectl logs -l app=api-gateway --tail=100 || true




