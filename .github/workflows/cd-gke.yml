name: CD to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NAMESPACE: mountainhub
  REGISTRY_HOST: ${{ secrets.GCP_ARTIFACT_REGISTRY_HOST }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # 2. Auth to Google Cloud
      # -------------------------
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_ARTIFACT_REGISTRY_HOST }} --quiet

      # -------------------------
      # 3. Build & push all images
      # -------------------------
      - name: Build and push images
        run: |
          TAG="${GITHUB_SHA}"
          BASE="${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}"

          build_push() {
            local name=$1
            local context=$2
            docker build -t "${BASE}/${name}:${TAG}" -t "${BASE}/${name}:latest" "${context}"
            docker push "${BASE}/${name}:${TAG}"
            docker push "${BASE}/${name}:latest"
          }

          build_push mountainhub-api-gateway ./backend/api-gateway-service
          build_push mountainhub-auth        ./backend/user-service
          build_push mountainhub-review      ./backend/review-service
          build_push mountainhub-trail       ./backend/trail-service
          build_push mountainhub-media       ./backend/media-service
          build_push mountainhub-frontend    ./frontend

          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      # -------------------------
      # 4. Get GKE credentials
      # -------------------------
      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -------------------------
      # 5. Enable Cloud Logging & Monitoring
      # -------------------------
      - name: Enable GKE logging and monitoring
        run: |
          gcloud container clusters update ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_CLUSTER_LOCATION }} \
            --logging=SYSTEM,WORKLOAD \
            --monitoring=SYSTEM \
            --quiet

      # -------------------------
      # 6. Apply base manifests
      # -------------------------
      - name: Apply namespace and config
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml

      - name: Create or update app secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET_GPX: ${{ secrets.SUPABASE_BUCKET_GPX }}
          SUPABASE_BUCKET_MEDIA: ${{ secrets.SUPABASE_BUCKET_MEDIA }}
        run: |
          kubectl create secret generic mountainhub-secrets \
            --namespace "$NAMESPACE" \
            --from-literal=SUPABASE_URL="$SUPABASE_URL" \
            --from-literal=SUPABASE_KEY="$SUPABASE_KEY" \
            --from-literal=SUPABASE_BUCKET_GPX="$SUPABASE_BUCKET_GPX" \
            --from-literal=SUPABASE_BUCKET_MEDIA="$SUPABASE_BUCKET_MEDIA" \
            --dry-run=client -o yaml | kubectl apply -f -

      # -------------------------
      # 7. Apply services
      # -------------------------
      - name: Apply services
        run: |
          kubectl apply -f infrastructure/k8s/backend/api-gateway-service/service.yaml
          kubectl apply -f infrastructure/k8s/backend/auth-service/service.yaml
          kubectl apply -f infrastructure/k8s/backend/review-service/service.yaml
          kubectl apply -f infrastructure/k8s/backend/trail-service/service.yaml
          kubectl apply -f infrastructure/k8s/backend/media-service/service.yaml
          kubectl apply -f infrastructure/k8s/frontend/service.yaml

      # -------------------------
      # 8. Apply deployments
      # -------------------------
      - name: Apply deployments
        run: |
          kubectl apply -f infrastructure/k8s/backend/api-gateway-service/deployment.yaml
          kubectl apply -f infrastructure/k8s/backend/auth-service/deployment.yaml
          kubectl apply -f infrastructure/k8s/backend/review-service/deployment.yaml
          kubectl apply -f infrastructure/k8s/backend/trail-service/deployment.yaml
          kubectl apply -f infrastructure/k8s/backend/media-service/deployment.yaml
          kubectl apply -f infrastructure/k8s/frontend/deployment.yaml

      # -------------------------
      # 9. Update image tags
      # -------------------------
      - name: Update image tags in deployments
        run: |
          BASE="${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}"
          TAG="${IMAGE_TAG}"

          kubectl set image deployment/api-gateway  api-gateway="${BASE}/mountainhub-api-gateway:${TAG}" -n "$NAMESPACE"
          kubectl set image deployment/auth-service  auth-service="${BASE}/mountainhub-auth:${TAG}"       -n "$NAMESPACE"
          kubectl set image deployment/review-service review-service="${BASE}/mountainhub-review:${TAG}" -n "$NAMESPACE"
          kubectl set image deployment/trail-service  trail-service="${BASE}/mountainhub-trail:${TAG}"   -n "$NAMESPACE"
          kubectl set image deployment/media-service  media-service="${BASE}/mountainhub-media:${TAG}"   -n "$NAMESPACE"
          kubectl set image deployment/frontend       frontend="${BASE}/mountainhub-frontend:${TAG}"     -n "$NAMESPACE"

      # -------------------------
      # 10. Deploy Prometheus + Grafana
      # -------------------------
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy monitoring (Prometheus + Grafana + Loki)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          # Disable admission webhooks — they create ClusterRoles which require cluster-admin RBAC
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --set grafana.adminPassword="${{ secrets.GRAFANA_PASSWORD }}" \
            --set grafana.service.type=LoadBalancer \
            --set prometheus.prometheusSpec.retention=7d \
            --set prometheusOperator.admissionWebhooks.enabled=false \
            --set prometheusOperator.admissionWebhooks.patch.enabled=false \
            --set grafana.additionalDataSources[0].name=Loki \
            --set grafana.additionalDataSources[0].type=loki \
            --set grafana.additionalDataSources[0].url=http://loki:3100 \
            --set grafana.additionalDataSources[0].access=proxy \
            --timeout=5m \
            --wait

          # Install Loki + Promtail (collects logs from all pods and ships to Loki)
          helm upgrade --install loki grafana/loki-stack \
            --namespace monitoring \
            --set promtail.enabled=true \
            --set loki.persistence.enabled=false \
            --timeout=5m \
            --wait

      # -------------------------
      # 11. Wait for rollouts
      # -------------------------
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/api-gateway   -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/auth-service  -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/review-service -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/trail-service  -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/media-service  -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/frontend       -n "$NAMESPACE" --timeout=120s

      # -------------------------
      # 12. Cluster summary
      # -------------------------
      - name: Cluster summary
        run: |
          kubectl get pods -n "$NAMESPACE"
          kubectl get svc  -n "$NAMESPACE"
          kubectl get pods -n monitoring

      # -------------------------
      # 13. Debug on failure
      # -------------------------
      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -n "$NAMESPACE" | tail -60
          kubectl logs -l app=api-gateway -n "$NAMESPACE" --tail=50 || true
