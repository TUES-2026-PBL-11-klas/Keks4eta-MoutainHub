apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mountainhub-ingress
  namespace: mountainhub
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  rules:
    - host: mountainhub.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
